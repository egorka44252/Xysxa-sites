<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Дія Мобіль</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-shield-alt"></i>
                    <span>Дія</span>
                </div>
                <div class="user">
                    <img src="https://via.placeholder.com/40" alt="avatar" class="avatar">
                    <span>Привіт, Іване!</span>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main>
            <div class="welcome">
                <h1>Добрий день!</h1>
                <p>Що хочете зробити сьогодні?</p>
            </div>

            <!-- Services Grid -->
            <div class="services">
                <div class="service-card" onclick="alert('Відкрито: Документи')">
                    <i class="fas fa-id-card"></i>
                    <span>Документи</span>
                </div>
                <div class="service-card" onclick="alert('Відкрито: Посвідчення')">
                    <i class="fas fa-car"></i>
                    <span>Посвідчення</span>
                </div>
                <div class="service-card" onclick="alert('Відкрито: COVID-сертифікат')">
                    <i class="fas fa-virus-covid"></i>
                    <span>Сертифікат</span>
                </div>
                <div class="service-card" onclick="alert('Відкрито: Платежі')">
                    <i class="fas fa-money-bill-wave"></i>
                    <span>Платежі</span>
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="quick-actions">
                <h2>Швидкі дії</h2>
                <button class="action-btn" onclick="showModal()">
                    <i class="fas fa-plus"></i> Отримати послугу
                </button>
            </div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="#" class="nav-item active">
                <i class="fas fa-home"></i>
                <span>Головна</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-search"></i>
                <span>Послуги</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-bell"></i>
                <span>Сповіщення</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-user"></i>
                <span>Профіль</span>
            </a>
        </nav>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <h3>Оберіть послугу</h3>
            <p>Тут може бути форма або список послуг</p>
            <button onclick="hideModal()">Закрити</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
