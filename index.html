<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XYSXA - Музыкальный портал</title>
  <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/egorka44252/Xysxa-sites/main/img/logo.jpg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Фоновое видео -->
  <div class="bg-layer">
    <video id="bg-video" autoplay loop muted playsinline preload="auto">
      <source src="https://raw.githubusercontent.com/egorka44252/Xysxa-sites/main/video/bg.mp4" type="video/mp4">
    </video>
    <div class="bg-overlay"></div>
  </div>

  <!-- Кнопка смены фона -->
  <button id="theme-btn" class="theme-toggle-btn" title="Сменить фон (B)">
    <div class="theme-btn-inner">
      <svg class="theme-icon" width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
      </svg>
      <span class="theme-text">Сменить фон</span>
    </div>
  </button>

  <!-- Кнопка NeoLauncher -->
  <a href="https://neolauncher.xyz/" target="_blank" id="neolauncher-btn" class="neolauncher-btn" title="NeoLauncher">
    <div class="neolauncher-btn-inner">
      <svg class="neolauncher-icon" width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
        <path d="M9.19 6.35c-2.04 2.29-3.44 5.58-3.57 5.89L2 10.69l4.05-4.05c.47-.47 1.15-.68 1.81-.55l1.33.26zm.88 11.59c.31-.13 3.58-1.53 5.87-3.57l.26 1.33c.13.66-.08 1.34-.55 1.81L11.4 22l-1.33-3.06zm8.96-8.96c-.57 5.2-5.1 9.14-8.96 10.16-.5-1.01-1.12-2.3-1.78-3.28L14 10.05l.96-.96-1.41-1.41-.96.96-5.8 5.8c-.98-.66-2.27-1.28-3.28-1.78 1.02-3.86 4.96-8.39 10.16-8.96 1.81 2.17 3.22 4.31 4.36 6.28zM14.5 9c.55 0 1-.45 1-1s-.45-1-1-1-1 .45-1 1 .45 1 1 1zM5 19c1 0 4-1 4-4-1 0-4 1-4 4z"/>
      </svg>
    </div>
    <span class="neolauncher-text">NeoLauncher</span>
  </a>

  <!-- Анимированные частицы -->
  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <!-- Шапка сайта -->
  <header class="site-header">
    <h1 class="logo-title">
      <span class="logo-text">Xysxa</span>
      <span class="logo-emoji">X_X</span>
    </h1>
    
    <!-- Социальные ссылки -->
    <div class="header-social">
      <a href="https://www.youtube.com/@kotvsmetane44252/videos" target="_blank" class="header-social-btn header-youtube" title="YouTube">
        <span class="social-icon">📺</span>
        <span>YouTube</span>
      </a>
      <a href="https://www.tiktok.com/@egorka4425" target="_blank" class="header-social-btn header-tiktok" title="TikTok">
        <span class="social-icon">🎵</span>
        <span>TikTok</span>
      </a>
      <a href="https://t.me/ZAZAHAPATSoft_sign" target="_blank" class="header-social-btn header-telegram" title="Telegram">
        <span class="social-icon">✈️</span>
        <span>Telegram</span>
      </a>
      <a href="https://steamcommunity.com/profiles/76561199558161465/" target="_blank" class="header-social-btn header-steam" title="Steam">
        <span class="social-icon">🎮</span>
        <span>Steam</span>
      </a>
      <div class="header-social-btn header-discord" title="Discord: xysxax_x (клик чтобы скопировать)">
        <span class="social-icon">💬</span>
        <span>xysxax_x</span>
      </div>
    </div>
  </header>

  <!-- Основной контент -->
  <main class="container">
    <!-- Музыкальный плеер -->
    <section class="music-player">
      <div class="player-wrapper">
        <!-- Обложка -->
        <div class="album-cover-wrapper">
          <div class="album-cover">
            <img id="cover-img" src="https://raw.githubusercontent.com/egorka44252/Xysxa-sites/main/img/logo.jpg" alt="Album Cover">
            <div class="vinyl-effect"></div>
          </div>
          <div class="glow-effect"></div>
        </div>

        <!-- Информация о треке -->
        <div class="track-info">
          <h2 id="track-name" class="track-name">Загрузка...</h2>
          <p id="track-time" class="track-duration">00:00 / 00:00</p>
        </div>

        <!-- Управление -->
        <div class="player-controls">
          <button id="prev-btn" class="control-btn" title="Предыдущий трек">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 6h2v12H6V6zm3.5 6l8.5 6V6l-8.5 6z"/>
            </svg>
          </button>
          
          <button id="play-btn" class="control-btn play-btn" title="Воспроизвести">
            <svg id="play-icon" width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
              <path d="M8 5v14l11-7z"/>
            </svg>
            <svg id="pause-icon" width="32" height="32" viewBox="0 0 24 24" fill="currentColor" style="display:none;">
              <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
            </svg>
          </button>
          
          <button id="next-btn" class="control-btn" title="Следующий трек">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
            </svg>
          </button>

          <button id="repeat-btn" class="control-btn" title="Повтор: Все треки">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
              <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/>
            </svg>
          </button>
        </div>

        <!-- Прогресс бар -->
        <div class="progress-container">
          <input type="range" id="progress-bar" class="progress-bar" min="0" max="100" value="0" step="0.1">
          <div class="time-display">
            <span id="current-time">00:00</span>
            <span id="total-time">00:00</span>
          </div>
        </div>

        <!-- Громкость -->
        <div class="bottom-controls">
          <div class="volume-control">
            <button id="mute-btn" class="volume-btn" title="Звук">
              <svg id="volume-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
              </svg>
              <svg id="mute-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="display:none;">
                <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
              </svg>
            </button>
            <input type="range" id="volume-slider" class="volume-slider" min="0" max="100" value="100" step="1">
            <span id="volume-value" class="volume-value">100%</span>
          </div>
        </div>

        <!-- Красивый список треков -->
        <div class="playlist-section">
          <h3 class="playlist-title">
            <span class="playlist-icon">🎶</span>
            Плейлист
          </h3>
          <div id="playlist-tracks" class="playlist-tracks"></div>
        </div>

        <!-- Скрытый аудио элемент -->
        <audio id="audio-player" preload="metadata"></audio>
      </div>
    </section>

    <!-- Информационная карточка -->
    <section class="info-card">
      <div class="info-icon">🎧</div>
      <h2 class="info-title">О проекте</h2>
      <p class="info-text">Добро пожаловать на музыкальный портал Xysxa!</p>
      <p class="info-text">Наслаждайтесь лучшими треками</p>
      <p class="contact-info">📞 Контакт: +380 93 417 3944</p>
    </section>
  </main>

  <!-- Футер -->
  <footer class="site-footer">
    <p>&copy; 2025 Xysxa. Все права защищены.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
