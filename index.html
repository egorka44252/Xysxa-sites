<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Дія</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(to bottom, #e0f0ff, #f0f8ff);
            color: #1c1c1e;
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header {
            padding: 20px 20px 10px;
            font-size: 28px;
            font-weight: 700;
        }

        .card {
            background: white;
            margin: 12px 16px;
            border-radius: 20px;
            padding: 18px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.07);
        }

        .nezlamnist {
            background: white;
            border-radius: 20px;
            padding: 18px;
            margin: 12px 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.07);
        }

        .icons {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
        }
        .icon-item {
            text-align: center;
            width: 80px;
        }
        .icon-item div {
            width: 64px;
            height: 64px;
            background: #111;
            border-radius: 16px;
            margin: 0 auto 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
        }
        .icon-item span {
            font-size: 13px;
            line-height: 1.3;
        }

        .drones-banner {
            margin: 12px 16px;
            background: linear-gradient(#0a1f0a, #1a331a);
            color: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .drones-banner h2 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .drones-banner p {
            font-size: 15px;
            opacity: 0.95;
        }
        .trident {
            font-size: 60px;
            margin: 10px 0;
        }

        .news-section {
            padding: 10px 16px;
        }
        .news-section h3 {
            margin-bottom: 12px;
            font-size: 19px;
            font-weight: 600;
        }
        .news-image {
            width: 100%;
            border-radius: 18px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.12);
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 8px 0 14px;
            box-shadow: 0 -3px 12px rgba(0,0,0,0.1);
            z-index: 100;
        }
        .nav-item {
            text-align: center;
            color: #666;
            font-size: 11px;
        }
        .nav-item.active {
            color: #0052cc;
        }
        .nav-item i {
            font-size: 24px;
            display: block;
            margin-bottom: 2px;
        }
    </style>
</head>
<body>

    <div class="header">Привіт, Руслан 👋</div>

    <!-- Незламність -->
    <div class="nezlamnist">
        <strong>Незламність</strong><br><br>
        Мапа укриттів. Пунктів незламності та віддалень Power Banking.<br>
        Заява про відсутній зв'язок.
        <div style="margin-top: 14px; display: flex; align-items: center; gap: 10px;">
            <div style="display: flex; gap: 6px;">
                <span style="background:#0052cc; color:white; width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px;">📍</span>
                <span style="background:#ffd700; color:black; width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px;">⚡</span>
                <span style="background:#00aa00; color:white; width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px;">🏠</span>
            </div>
            <div style="margin-left: auto; background:#111; color:white; width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px;">→</div>
        </div>
    </div>

    <!-- Іконки сервісів -->
    <div class="icons">
        <div class="icon-item">
            <div><i class="fas fa-qrcode"></i></div>
            <span>Дія<br>Сканер</span>
        </div>
        <div class="icon-item">
            <div><i class="fas fa-shield-alt"></i></div>
            <span>Військові<br>облігації</span>
        </div>
        <div class="icon-item">
            <div><i class="fas fa-wifi"></i></div>
            <span>Відсутній<br>зв'язок</span>
        </div>
    </div>

    <!-- Лінія Дронів -->
    <div class="drones-banner">
        <div class="trident">⚔️</div>
        <h2>ЛІНІЯ ДРОНІВ</h2>
        <p>Змінити хід подій</p>
        <div style="position:absolute; right:20px; bottom:20px; background:rgba(255,255,255,0.2); width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:22px;">→</div>
    </div>

    <!-- Що нового? -->
    <div class="news-section">
        <h3>Що нового?</h3>
        <img src="https://via.placeholder.com/440x220/FFAA00/111111?text=Енергетики+на+лінії" 
             class="news-image" 
             alt="Що нового">
    </div>

    <!-- Нижня навігація -->
    <div class="bottom-nav">
        <div class="nav-item active">
            <i class="fas fa-home"></i>
            <div>Стрічка</div>
        </div>
        <div class="nav-item" onclick="showDocuments()">
            <i class="fas fa-id-card"></i>
            <div>Документи</div>
        </div>
        <div class="nav-item">
            <i class="fas fa-bolt"></i>
            <div>Сервіси</div>
        </div>
        <div class="nav-item">
            <i class="fas fa-user"></i>
            <div>Меню</div>
        </div>
    </div>

    <script>
        function showDocuments() {
            alert("Перехід до розділу Документи (можна підключити окремий екран)");
            // Тут можна додати перехід на єДокумент
        }
    </script>
</body>
</html>
