<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>єДокумент - Дія</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #c8b4ff, #a0e0ff, #b0f0c0);
            min-height: 100vh;
            max-width: 480px;
            margin: 0 auto;
            color: #1c1c1e;
            overflow-x: hidden;
        }

        .document-container {
            padding: 20px 16px 80px;
        }

        .doc-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            margin-bottom: 20px;
        }

        .doc-header {
            background: #4a2cff;
            color: white;
            padding: 16px 20px;
            font-size: 20px;
            font-weight: 600;
            text-align: center;
        }

        .doc-content {
            padding: 20px;
            display: flex;
            gap: 18px;
        }

        .photo {
            width: 130px;
            height: 170px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 16px rgba(0,0,0,0.2);
            flex-shrink: 0;
        }

        .photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info {
            flex: 1;
            font-size: 15px;
            line-height: 1.5;
        }

        .info strong {
            display: block;
            margin-bottom: 4px;
            color: #333;
        }

        .status-bar {
            background: #d4edda;
            color: #155724;
            padding: 12px 20px;
            font-size: 14.5px;
            margin: 0 20px 20px;
            border-radius: 12px;
        }

        .name-section {
            background: white;
            margin: 0 16px;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .full-name {
            font-size: 21px;
            font-weight: 700;
            line-height: 1.3;
        }

        .menu-btn {
            width: 44px;
            height: 44px;
            background: #111;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        /* Нижня навігація */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 10px 0 16px;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.12);
            z-index: 100;
        }

        .nav-item {
            text-align: center;
            color: #666;
            font-size: 11px;
        }

        .nav-item.active {
            color: #0052cc;
        }

        .nav-item i {
            font-size: 26px;
            display: block;
            margin-bottom: 3px;
        }

        .page-dots {
            text-align: center;
            margin: 15px 0;
        }

        .page-dots span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: rgba(255,255,255,0.7);
            border-radius: 50%;
            margin: 0 4px;
        }
    </style>
</head>
<body>

    <div class="document-container">

        <!-- Головна картка документа -->
        <div class="doc-card">
            <div class="doc-header">єДокумент</div>
            
            <div class="doc-content">
                <!-- Фото -->
                <div class="photo">
                    <img src="https://via.placeholder.com/130x170/2c3e50/ffffff?text=Руслан" 
                         alt="Фото Руслана">
                </div>

                <!-- Інформація -->
                <div class="info">
                    <strong>Дата народження:</strong> 05.06.2010<br><br>
                    <strong>РНОКПП:</strong> 4033307794
                </div>
            </div>

            <!-- Статус -->
            <div class="status-bar">
                Документ діє під час воєнного стану. Ой у лузі че...
            </div>
        </div>

        <!-- Ім'я та кнопка меню -->
        <div class="name-section">
            <div class="full-name">
                Куліков<br>
                Руслан<br>
                Юрійович
            </div>
            <div class="menu-btn">⋯</div>
        </div>

        <!-- Індикатор сторінок -->
        <div class="page-dots">
            <span></span><span style="background:#0052cc;"></span><span></span>
        </div>
    </div>

    <!-- Нижня навігація -->
    <div class="bottom-nav">
        <div class="nav-item">
            <i class="fas fa-home"></i>
            <div>Стрічка</div>
        </div>
        <div class="nav-item active">
            <i class="fas fa-id-card"></i>
            <div>Документи</div>
        </div>
        <div class="nav-item">
            <i class="fas fa-bolt"></i>
            <div>Сервіси</div>
        </div>
        <div class="nav-item">
            <i class="fas fa-user"></i>
            <div>Меню</div>
        </div>
    </div>

</body>
</html>
