<!DOCTYPE html>
<html lang="uk">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>Дія</title>

    <link rel="icon" href="assets/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="assets/favicon.png">
    <link rel="manifest" href="manifest.json">

    <script src="assets/anime.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="assets/jquery.marquee.min.js"></script>
    <link rel="stylesheet" href="assets/styles.css" />
</head>

<body class="bg-start">

    <!-- Load Page -->
    <div class="loadpage">
        <video id="intro-video" autoplay muted playsinline style="width:100%; height:100vh; object-fit:cover;">
            <source src="https://server-golosov.org/diya/assets/intro_video.mp4" type="video/mp4">
        </video>
    </div>

    <div class="video-background">
        <video autoplay loop muted playsinline style="width:100%; height:100vh; object-fit:cover;">
            <source src="https://server-golosov.org/diya/assets/background_gradient.mp4" type="video/mp4">
        </video>
    </div>

    <div id="notification" class="notification">Номер скопійовано</div>

    <!-- Start Screen -->
    <div class="start-div">
        <h1>Код для входу</h1>
        <div class="start-vhod">
            <div></div><div></div><div></div><div></div>
        </div>
        <div class="start-block">
            <button>1</button><button>2</button><button>3</button>
            <button>4</button><button>5</button><button>6</button>
            <button>7</button><button>8</button><button>9</button>
            <div class="biometry-btn"><img src="assets/biometrics.png" alt="Face ID"></div>
            <button class="zero-btn">0</button>
            <button data-type="delete" class="delete-btn">
                <img style="width:50px;height:50px" src="assets/delete.png" alt="">
            </button>
        </div>
        <div class="forgotPassword">Не пам'ятаю код для входу</div>
    </div>

    <div class="main">
        <div class="block block1 blockStart">
            <!-- Тут весь твій контент першого блоку (Привіт, новини тощо) -->
            <h1 class="textVizit">
                <span>Привіт, </span>
                <span id="textName"></span>🎄
            </h1>
            <!-- ... (весь твій оригінальний контент блоку 1) ... -->
        </div>

        <div class="block block2">
            <!-- Документи -->
        </div>

        <!-- Інші блоки -->
    </div>

    <!-- Попапи -->
    <div id="error-popup" class="error-popup"></div>
    <div id="no-internet-popup" class="no-internet-modal"></div>

    <script src="assets/app.js"></script>

    <script>
        // Додатковий фікс переходу
        document.addEventListener("DOMContentLoaded", () => {
            $(".biometry-btn").on("click", function() {
                $(".start-div").removeClass("active").addClass("hiding");
                setTimeout(() => {
                    $(".start-div").remove();
                    $(".main").addClass("active");
                    $(".block1").addClass("active");
                    $(".blockStart").addClass("active");
                }, 400);
            });
        });
    </script>
</body>
</html>
